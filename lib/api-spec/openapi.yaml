openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Agentic as a Service (AaaS) API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and tenant management
  - name: agents
    description: Agent CRUD and execution
  - name: runs
    description: Agent run management
  - name: mcp-connections
    description: MCP tool server connections
  - name: webhooks
    description: Webhook management
  - name: schedules
    description: Scheduled trigger management
  - name: analytics
    description: Usage analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user and tenant
      security:
        - clerkSession: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWithTenant"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/onboard:
    post:
      operationId: onboardUser
      tags: [auth]
      summary: Create tenant and user on first login
      security:
        - clerkSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardRequest"
      responses:
        "201":
          description: Tenant and user created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWithTenant"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/api-key/rotate:
    post:
      operationId: rotateApiKey
      tags: [auth]
      summary: Generate a new API key for the tenant
      security:
        - clerkSession: []
      responses:
        "200":
          description: New API key generated (shown once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyRotateResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List all agents for the tenant
      security:
        - clerkSession: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, paused, archived]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentList"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: createAgent
      tags: [agents]
      summary: Create a new agent
      security:
        - clerkSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRequest"
      responses:
        "201":
          description: Agent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /agents/{agentId}:
    get:
      operationId: getAgent
      tags: [agents]
      summary: Get agent details
      security:
        - clerkSession: []
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: updateAgent
      tags: [agents]
      summary: Update an agent
      security:
        - clerkSession: []
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentRequest"
      responses:
        "200":
          description: Agent updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteAgent
      tags: [agents]
      summary: Archive an agent
      security:
        - clerkSession: []
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /agents/{agentId}/run:
    post:
      operationId: triggerAgentRun
      tags: [agents]
      summary: Trigger an agent run
      security:
        - clerkSession: []
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TriggerRunRequest"
      responses:
        "201":
          description: Run queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRun"
        "400":
          description: Agent not active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Concurrent run limit reached
          content:
            application/json:
              schema:
                type: object
                required: [error, message, plan, limit, active]
                properties:
                  error:
                    type: string
                    example: Concurrent run limit reached
                  message:
                    type: string
                    example: Your free plan allows 5 concurrent runs.
                  plan:
                    type: string
                    example: free
                  limit:
                    type: number
                    example: 5
                  active:
                    type: number
                    example: 5

  /runs:
    get:
      operationId: listRuns
      tags: [runs]
      summary: List all runs for the tenant
      security:
        - clerkSession: []
      parameters:
        - name: agentId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [queued, running, awaiting_approval, completed, failed, cancelled, budget_exceeded]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunList"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /runs/{runId}:
    get:
      operationId: getRun
      tags: [runs]
      summary: Get run details and steps
      security:
        - clerkSession: []
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Run details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /runs/{runId}/approve:
    post:
      operationId: approveRun
      tags: [runs]
      summary: Approve a pending tool call (human-in-the-loop)
      security:
        - clerkSession: []
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Run approved and resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRun"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /runs/{runId}/stream:
    get:
      operationId: streamRun
      tags: [runs]
      x-orval-ignore: true
      summary: Stream live run events via SSE
      description: |
        Server-Sent Events (SSE) stream for a run. Emits `step`, `status`, and `done` events.
        Each event is a JSON-encoded `RunStreamEvent` object.
        NOTE: Use the native EventSource API to consume this endpoint — not the generated React Query hook.
      security:
        - clerkSession: []
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SSE stream of run events
          content:
            text/event-stream:
              schema:
                type: string
        "404":
          description: Run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /runs/{runId}/cancel:
    post:
      operationId: cancelRun
      tags: [runs]
      summary: Cancel a running agent
      security:
        - clerkSession: []
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Run cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRun"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mcp-connections:
    get:
      operationId: listMcpConnections
      tags: [mcp-connections]
      summary: List MCP connections
      security:
        - clerkSession: []
      responses:
        "200":
          description: List of MCP connections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpConnectionList"

    post:
      operationId: createMcpConnection
      tags: [mcp-connections]
      summary: Add an MCP server connection
      security:
        - clerkSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMcpConnectionRequest"
      responses:
        "201":
          description: Connection created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpConnection"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mcp-connections/{connectionId}:
    get:
      operationId: getMcpConnection
      tags: [mcp-connections]
      summary: Get an MCP connection by ID
      security:
        - clerkSession: []
      parameters:
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: MCP connection detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpConnection"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: updateMcpConnection
      tags: [mcp-connections]
      summary: Update an MCP connection
      security:
        - clerkSession: []
      parameters:
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMcpConnectionRequest"
      responses:
        "200":
          description: Connection updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpConnection"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteMcpConnection
      tags: [mcp-connections]
      summary: Remove an MCP connection
      security:
        - clerkSession: []
      parameters:
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Connection deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpConnection"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mcp-connections/{connectionId}/test:
    post:
      operationId: testMcpConnection
      tags: [mcp-connections]
      summary: Test connection and list available tools
      security:
        - clerkSession: []
      parameters:
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpConnectionTestResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /webhooks:
    get:
      operationId: listWebhooks
      tags: [webhooks]
      summary: List webhooks
      security:
        - clerkSession: []
      responses:
        "200":
          description: List of webhooks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookList"

    post:
      operationId: createWebhook
      tags: [webhooks]
      summary: Register a webhook
      security:
        - clerkSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhookRequest"
      responses:
        "201":
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /webhooks/{webhookId}:
    get:
      operationId: getWebhook
      tags: [webhooks]
      summary: Get a webhook by ID
      security:
        - clerkSession: []
      parameters:
        - name: webhookId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Webhook detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: updateWebhook
      tags: [webhooks]
      summary: Update a webhook
      security:
        - clerkSession: []
      parameters:
        - name: webhookId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWebhookRequest"
      responses:
        "200":
          description: Webhook updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteWebhook
      tags: [webhooks]
      summary: Remove a webhook
      security:
        - clerkSession: []
      parameters:
        - name: webhookId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Webhook deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /schedules:
    get:
      operationId: listSchedules
      tags: [schedules]
      summary: List scheduled triggers
      security:
        - clerkSession: []
      responses:
        "200":
          description: List of schedules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleList"

    post:
      operationId: createSchedule
      tags: [schedules]
      summary: Create a scheduled trigger
      security:
        - clerkSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScheduleRequest"
      responses:
        "201":
          description: Schedule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /schedules/{scheduleId}:
    put:
      operationId: updateSchedule
      tags: [schedules]
      summary: Update a scheduled trigger
      security:
        - clerkSession: []
      parameters:
        - name: scheduleId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScheduleRequest"
      responses:
        "200":
          description: Schedule updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteSchedule
      tags: [schedules]
      summary: Delete a scheduled trigger
      security:
        - clerkSession: []
      parameters:
        - name: scheduleId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Schedule deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analytics/usage:
    get:
      operationId: getUsageAnalytics
      tags: [analytics]
      summary: Get usage analytics over time
      security:
        - clerkSession: []
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Usage analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageAnalytics"

  /analytics/agents:
    get:
      operationId: getAgentAnalytics
      tags: [analytics]
      summary: Get per-agent performance stats
      security:
        - clerkSession: []
      responses:
        "200":
          description: Per-agent stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentAnalyticsList"

components:
  securitySchemes:
    clerkSession:
      type: apiKey
      in: cookie
      name: __session

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Tenant:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        plan:
          type: string
          enum: [free, pro, enterprise]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - plan
        - createdAt

    UserWithTenant:
      type: object
      properties:
        id:
          type: string
        clerkUserId:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [owner, admin, member]
        tenant:
          $ref: "#/components/schemas/Tenant"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - clerkUserId
        - email
        - role
        - tenant
        - createdAt

    OnboardRequest:
      type: object
      properties:
        tenantName:
          type: string
      required:
        - tenantName

    Agent:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        description:
          type: string
        systemPrompt:
          type: string
        model:
          type: string
        tools:
          type: array
          items: {}
        maxSteps:
          type: integer
        maxBudgetCents:
          type: integer
        approvalMode:
          type: string
          enum: [auto, human_in_loop]
        status:
          type: string
          enum: [active, paused, archived]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - tenantId
        - name
        - description
        - systemPrompt
        - model
        - tools
        - maxSteps
        - maxBudgetCents
        - approvalMode
        - status
        - createdAt
        - updatedAt

    AgentList:
      type: object
      properties:
        agents:
          type: array
          items:
            $ref: "#/components/schemas/Agent"
        total:
          type: integer
      required:
        - agents
        - total

    CreateAgentRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        systemPrompt:
          type: string
        model:
          type: string
        tools:
          type: array
          items: {}
        maxSteps:
          type: integer
        maxBudgetCents:
          type: integer
        approvalMode:
          type: string
          enum: [auto, human_in_loop]
      required:
        - name

    UpdateAgentRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        systemPrompt:
          type: string
        model:
          type: string
        tools:
          type: array
          items: {}
        maxSteps:
          type: integer
        maxBudgetCents:
          type: integer
        approvalMode:
          type: string
          enum: [auto, human_in_loop]
        status:
          type: string
          enum: [active, paused, archived]

    AgentRunStep:
      type: object
      properties:
        stepNumber:
          type: integer
        thought:
          type: ["string", "null"]
        toolCalls:
          type: array
          items: {}
        toolResults:
          type: array
          items: {}
        tokensUsed:
          type: integer
      required:
        - stepNumber
        - tokensUsed

    AgentRun:
      type: object
      properties:
        id:
          type: string
        agentId:
          type: string
        tenantId:
          type: string
        trigger:
          type: string
          enum: [manual, api, schedule, webhook]
        input:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [queued, running, awaiting_approval, completed, failed, cancelled, budget_exceeded]
        output:
          type: ["object", "null"]
          additionalProperties: true
        totalTokens:
          type: integer
        costCents:
          type: integer
        startedAt:
          type: ["string", "null"]
          format: date-time
        completedAt:
          type: ["string", "null"]
          format: date-time
        error:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - agentId
        - tenantId
        - trigger
        - input
        - status
        - totalTokens
        - costCents
        - createdAt

    AgentRunDetail:
      allOf:
        - $ref: "#/components/schemas/AgentRun"
        - type: object
          properties:
            steps:
              type: array
              items:
                $ref: "#/components/schemas/AgentRunStep"
            agent:
              $ref: "#/components/schemas/Agent"
          required:
            - steps
            - agent

    AgentRunList:
      type: object
      properties:
        runs:
          type: array
          items:
            $ref: "#/components/schemas/AgentRun"
        total:
